# Include inside HTTP/1.x server blocks only (e.g. listen 80).
# Do NOT include keepalive_timeout in HTTP/2 (ssl http2) location blocks.
# Prefer setting keepalive_timeout 0 at the HTTP :80 server level.

location /iclock/ {
    proxy_pass http://127.0.0.1:4000/iclock/;
    proxy_http_version 1.0;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection close;
    proxy_buffering off;
    chunked_transfer_encoding off;
    gzip off;
    proxy_hide_header Server;
    proxy_hide_header X-Powered-By;
    proxy_connect_timeout 60s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    client_max_body_size 10m;
}
