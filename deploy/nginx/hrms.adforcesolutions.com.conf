# Adforce HRMS — Nginx site config
# Primary domain: hrms.adforcesolutions.com
# Legacy alias:    hr.adforcesolutions.com
# Backend: Node/Express on 127.0.0.1:4000
#
# ZKTeco SenseFace ADMS devices cannot follow HTTP→HTTPS redirects.
# /iclock/* MUST be served on plain HTTP (port 80) without redirect.
# ZKTeco requires Connection: close (not keep-alive) and HTTP/1.0 to backend.
#
# Install:
#   sudo cp deploy/nginx/hrms.adforcesolutions.com.conf /etc/nginx/sites-available/hrms
#   sudo ln -sf /etc/nginx/sites-available/hrms /etc/nginx/sites-enabled/hrms
#   sudo nginx -t && sudo systemctl reload nginx
#
# Device Cloud Server URL (HTTP only):
#   http://hrms.adforcesolutions.com/iclock/cdata

upstream hrms_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

# ─── Port 80: ADMS on HTTP; everything else → HTTPS ───
server {
    listen 80;
    listen [::]:80;
    server_name hrms.adforcesolutions.com hr.adforcesolutions.com;

    # ZKTeco ADMS — Connection: close required (keep-alive breaks handshake)
    location /iclock/ {
        proxy_pass http://127.0.0.1:4000/iclock/;
        proxy_http_version 1.0;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection close;
        proxy_buffering off;
        chunked_transfer_encoding off;
        gzip off;
        proxy_hide_header Server;
        proxy_hide_header X-Powered-By;
        keepalive_timeout 0;
        proxy_read_timeout 30s;
        client_max_body_size 10m;
    }

    # All other HTTP traffic → HTTPS (preserves Host header per domain)
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Port 443: hrms.adforcesolutions.com ───
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hrms.adforcesolutions.com;

    ssl_certificate     /etc/letsencrypt/live/hrms.adforcesolutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hrms.adforcesolutions.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /iclock/ {
        proxy_pass http://127.0.0.1:4000/iclock/;
        proxy_http_version 1.0;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection close;
        proxy_buffering off;
        chunked_transfer_encoding off;
        gzip off;
        proxy_hide_header Server;
        proxy_hide_header X-Powered-By;
        keepalive_timeout 0;
        proxy_read_timeout 30s;
        client_max_body_size 10m;
    }

    location / {
        proxy_pass http://hrms_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── Port 443: hr.adforcesolutions.com (separate cert — avoids SAN mismatch) ───
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hr.adforcesolutions.com;

    ssl_certificate     /etc/letsencrypt/live/hr.adforcesolutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hr.adforcesolutions.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /iclock/ {
        proxy_pass http://127.0.0.1:4000/iclock/;
        proxy_http_version 1.0;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection close;
        proxy_buffering off;
        chunked_transfer_encoding off;
        gzip off;
        proxy_hide_header Server;
        proxy_hide_header X-Powered-By;
        keepalive_timeout 0;
        proxy_read_timeout 30s;
        client_max_body_size 10m;
    }

    location / {
        proxy_pass http://hrms_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
