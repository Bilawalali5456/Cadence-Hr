# Adforce HRMS — Nginx site config
# Domain: hrms.adforcesolutions.com
# Backend: Node/Express on 127.0.0.1:4000
#
# ZKTeco SenseFace ADMS devices cannot follow HTTP→HTTPS redirects.
# /iclock/* MUST be served on plain HTTP (port 80) without redirect.
#
# Install:
#   sudo cp deploy/nginx/hrms.adforcesolutions.com.conf /etc/nginx/sites-available/hrms
#   sudo ln -sf /etc/nginx/sites-available/hrms /etc/nginx/sites-enabled/hrms
#   sudo nginx -t && sudo systemctl reload nginx
#
# Device Cloud Server URL (HTTP only):
#   http://hrms.adforcesolutions.com/iclock/cdata

upstream hrms_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

# ─── Port 80: ADMS on HTTP; everything else → HTTPS ───
server {
    listen 80;
    listen [::]:80;
    server_name hrms.adforcesolutions.com hr.adforcesolutions.com;

    # ZKTeco ADMS push protocol — NEVER redirect these paths to HTTPS
    location /iclock/ {
        proxy_pass http://hrms_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 10m;
    }

    # All other HTTP traffic → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Port 443: HRMS portal (HTTPS) ───
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hrms.adforcesolutions.com hr.adforcesolutions.com;

    # Let's Encrypt (adjust paths if using certbot)
    ssl_certificate     /etc/letsencrypt/live/hrms.adforcesolutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hrms.adforcesolutions.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ADMS over HTTPS (optional — device should use HTTP port 80)
    location /iclock/ {
        proxy_pass http://hrms_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 10m;
    }

    # API + SPA (Express serves both on :4000)
    location / {
        proxy_pass http://hrms_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
